<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>APEX CAM</title>

<style>
body {
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family: monospace;
}

.app {
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* topo */
.top-bar {
  padding:10px;
  display:flex;
  justify-content:space-between;
  background:#111;
}

.logo {
  color:#ff6b00;
  letter-spacing:3px;
}

.status {
  display:flex;
  gap:10px;
}

/* câmera */
.view {
  flex:1;
  position:relative;
  background:black;
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* grid */
.grid {
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
  background-size:33% 33%;
}

/* botão */
.controls {
  padding:15px;
  display:flex;
  justify-content:center;
  background:#111;
}

.btn {
  width:70px;
  height:70px;
  border-radius:50%;
  background:white;
  cursor:pointer;
}
.btn:active {
  transform:scale(0.9);
}

/* flash */
.flash {
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
}
.flash.active {
  opacity:1;
}
</style>
</head>

<body>

<div class="app">

  <div class="top-bar">
    <div class="logo">APEX CAM</div>
    <div class="status">
      <span>ISO 400</span>
      <span>1/125</span>
    </div>
  </div>

  <div class="view">
    <video id="video" autoplay playsinline></video>
    <div class="grid"></div>
  </div>

  <div class="controls">
    <div class="btn" onclick="capture()"></div>
  </div>

</div>

<div class="flash" id="flash"></div>

<script>
// iniciar câmera
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => {
  video.srcObject = stream;
})
.catch(() => {
  alert("Permita o uso da câmera!");
});

// flash
function capture(){
  const flash = document.getElementById("flash");
  flash.classList.add("active");
  setTimeout(()=> flash.classList.remove("active"),100);
}
</script>

</body>
</html>
